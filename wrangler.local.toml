name = "misub"
type = "javascript"
main = "src/index.js"
compatibility_date = "2024-04-01"

# 🔧 本地开发配置
# 这个文件专门用于本地调试
# 在部署到 Cloudflare Pages 时，使用 wrangler-cf-pages.toml

[env.development]
name = "misub-dev"

[dev]
port = 8787
local_protocol = "http"
ip = "127.0.0.1"

# KV 命名空间（本地模拟）
[[kv_namespaces]]
binding = "KV_STORAGE"
id = "misub_kv_local"
preview_id = "misub_kv_preview"

# D1 数据库（本地可选）
# [[d1_databases]]
# binding = "DB"
# database_name = "misub"
# database_id = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

# 环境变量
[env.development.vars]
ENVIRONMENT = "development"
LOG_LEVEL = "debug"
CACHE_TTL_MS = "600000"
ENABLE_CRON = "false"

compatibility_flags = ["nodejs_compat"]

# 日志
[logger]
enabled = true

# 📝 注意事项：
# 1. 这个配置文件用于本地开发
# 2. 部署到 Cloudflare Pages 时：
#    - 不需要 account_id 和 zone_id
#    - 使用 wrangler-cf-pages.toml 或通过 UI 配置
#    - Cron Triggers 在 Cloudflare 后台配置
# 3. KV 命名空间需要先在 Cloudflare 创建
# 4. D1 数据库需要先在 Cloudflare 创建
